<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ dir }}">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover maximum-scale=1.0, user-scalable=no" />
    <title>DoBiz HR</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Do Business HR" />
    <meta name="apple-mobile-web-app-status-bar-style" content="white" />
    <meta name="theme-color" content="#fff" />
    <link rel="icon" type="image/png" sizes="196x196" href="/assets/dobiz_custom/images/DoBiz_Taiba.png" />
    <link rel="apple-touch-icon" href="/assets/dobiz_custom/images/DoBiz_Taiba.png" />
    <script type="module" crossorigin src="/assets/hrms/frontend/assets/index-B1DrJwui.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/hrms/frontend/assets/frappe-ui-Cee7Yz-T.js">
    <link rel="stylesheet" crossorigin href="/assets/hrms/frontend/assets/frappe-ui-IZoKCQSt.css">
    <link rel="stylesheet" crossorigin href="/assets/hrms/frontend/assets/index-YfRVyGv7.css">
    <link rel="manifest" href="/assets/hrms/frontend/manifest.webmanifest">
    <link rel="stylesheet" href="/assets/dobiz_custom/css/arabic_font.css">
</head>
<body class="antialiased">
    <div id="app"></div>
    <div id="modals"></div>
    <div id="popovers"></div>
    <script>
        window.csrf_token = "{{ csrf_token }}"
        window.site_name = '{{ site_name }}'
        if (!window.frappe) window.frappe = {}
        frappe.boot = {{ boot }}
        if (frappe.boot && frappe.boot.lang && frappe.boot.lang.indexOf('ar') === 0) {
            document.documentElement.setAttribute('dir', 'rtl');
            document.documentElement.setAttribute('lang', 'ar');
        }
    </script>
    <script src="/assets/dobiz_custom/js/hrms_overrides.js"></script>
</body>
</html>
